name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck doxygen clang-format

      - name: Run build pipeline
        run: ./build.sh

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: doxygen-docs
          path: docs/html/
